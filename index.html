<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application tracker</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme{
            --font-syne:"syne",sans-serif;
            --font-dm:'DM Sans',sans-serif;
            --color-navy:#1d3557;
            --color-teal:#2a9d8f;
            --color-coral:#e76f51;
            --animated-fade-up:fadeup 0.3s ease forwards;
            @keyframes fadeUp{
                0%{
                    opacity:0;
                    transform:translateY(10px);
                }
                100%{
                    opacity: 1;
                    transform:translateY(0)
                }
            }
        }
    </style>

    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <script src="https://kit.fontawesome.com/cc9e8f4940.js" crossorigin="anonymous"></script>
</head>

<body class="bg-slate-100 font-dm min-h-screen">
    <header class="px-5 py-6 md:max-w-6xl mx-auto">
        <h1 class="font-syne text-2xl md:text-3xl font-extrabold text-navy tracking-tight">
            Job Application Tracker
        </h1>
    </header>
    <div class="md:max-w-6xl mx-auto">
        <main class="px-5 pb-10 lg:px-10 overflow-y-auto">
            <div class="flex flex-wrap gap-4 mb-6">
                <div class="flex-1 min-w-28 bg-white rounded-2xl px-6 py-5 shadow-sm">
                    <p class="text-xs text-slate-500 mb-1"> Total </p>
                    <p class="font-syne text-4xl font-extrabold text-navy">0 </p>
                </div>
                <div class="flex-1 min-w-28 bg-white rounded-2xl px-6 py-5 shadow-sm">
                    <p class="text-xs text-slate-500 mb-1"> Interview </p>
                    <p class="font-syne text-4xl font-extrabold text-navy">0 </p>
                </div>
                <div class="flex-1 min-w-28 bg-white rounded-2xl px-6 py-5 shadow-sm">
                    <p class="text-xs text-slate-500 mb-1"> Rejected </p>
                    <p class="font-syne text-4xl font-extrabold text-navy">0 </p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
